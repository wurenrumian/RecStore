name: Documentation Update

on:
  pull_request_target:
    paths:
      - 'src/**'
      - 'model_zoo/**'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          git remote add base https://github.com/${{ github.event.pull_request.base.repo.full_name }}
          git fetch base ${{ github.event.pull_request.base.ref }}
          
          CHANGED_FILES=$(git diff --name-only base/${{ github.event.pull_request.base.ref }} ${{ github.event.pull_request.head.sha }})
          
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check documentation
        id: check
        run: |
          python3 ci/docs/check_updated_docs.py "${{ steps.changes.outputs.files }}" > /tmp/comment.txt 2>&1
          if [ -s /tmp/comment.txt ] && [ $? -eq 0 ]; then
            cat /tmp/comment.txt
            echo "has_comment=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Comment PR
        if: steps.check.outputs.has_comment == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/comment.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
