name: Run Tests (CPU, manual only)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  manual-notice:
    name: Manual test workflow retired
    runs-on: ubuntu-latest
    steps:
      - name: Explain retirement
        run: |
          cat <<'MSG'
          This workflow no longer runs automatically.
          CPU build, OP test, and YCSB test have been merged into .github/workflows/ci-build.yml
          so their job results appear as formal pull request and commit checks.
          MSG
