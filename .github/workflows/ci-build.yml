name: CPU CI

on:
  push:
    paths:
      - 'src/**'
      - 'model_zoo/**'
      - 'ci/**'
      - 'dockerfiles/**'
      - 'third_party/**'
      - '.github/workflows/ci-build.yml'
      - '.github/workflows/ci-test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'model_zoo/**'
      - 'ci/**'
      - 'dockerfiles/**'
      - 'third_party/**'
      - '.github/workflows/ci-build.yml'
      - '.github/workflows/ci-test.yml'

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    env:
      TORCH_VERSION: "2.5.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Cache submodules git data
        uses: actions/cache@v4
        with:
          path: .git/modules
          key: submodules-${{ runner.os }}-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            submodules-${{ runner.os }}-${{ hashFiles('.gitmodules') }}
            submodules-${{ runner.os }}-

      - name: Update submodules
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 4 --depth 0

      - name: Free disk space
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          sudo docker system prune -af || true
          df -h

      - name: Install host prerequisites
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          bash ci/env/init_host_prereqs.sh

      - name: Init env inside docker
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          CI_THROTTLE_MAKE=1 LIBTORCH_VARIANT=cpu SKIP_SPDK=1 SKIP_HUGECTR=1 SKIP_LIBIBVERBS=1 \
            bash dockerfiles/init_env_inside_docker.sh

      - name: Install PyTorch wheel
        env:
          TORCH_VERSION: "${{ env.TORCH_VERSION }}"
        run: |
          set -euo pipefail
          bash dockerfiles/build_torch_wheel.sh
          WHL=$(ls -1 binary/torch-${TORCH_VERSION}*linux_x86_64.whl | head -n1)
          python3 -m pip install --no-cache-dir "$WHL"

      - name: Upload torch wheel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-torch-wheel
          path: binary/torch-${{ env.TORCH_VERSION }}*linux_x86_64.whl

      - name: Configure CMake
        run: |
          set -euo pipefail
          mkdir -p build
          cd build
          cmake -DENABLE_CUDA=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..

      - name: Build
        run: |
          set -euo pipefail
          cd build
          make -j4

      - name: Pack artifacts
        run: |
          set -euo pipefail
          bash ci/pack/pack_artifact.sh build/recstore-cpu-ps-server-package.tar.gz build/bin/ps_server
          bash ci/pack/pack_artifact.sh build/recstore-cpu-ops-package.tar.gz build/lib/lib_recstore_ops.so
          bash ci/pack/pack_artifact.sh build/recstore-cpu-ycsb-package.tar.gz build/bin/ycsb

      - name: Upload ps_server package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-ps-server-package
          path: build/recstore-cpu-ps-server-package.tar.gz

      - name: Upload recstore ops package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-ops-package
          path: build/recstore-cpu-ops-package.tar.gz

      - name: Upload ycsb package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-ycsb-package
          path: build/recstore-cpu-ycsb-package.tar.gz

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-build-logs
          path: |
            init_env_*.log
            build/CMakeCache.txt
            build/CMakeCache.txt
            build/compile_commands.json

  run-op-ps-server-test:
    name: Test ps_server and OP
    needs: build
    runs-on: ubuntu-latest
    env:
      TORCH_VERSION: "2.5.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install host prerequisites
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          bash ci/env/init_host_prereqs.sh

      - name: Download torch wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: recstore-cpu-torch-wheel
          path: wheel

      - name: Install wheel
        run: |
          set -euo pipefail
          WHL=$(ls -1 wheel/torch-${TORCH_VERSION}*linux_x86_64.whl | head -n1)
          python3 -m pip install --no-cache-dir "$WHL"

      - name: Download ps_server package artifact
        uses: actions/download-artifact@v4
        with:
          name: recstore-cpu-ps-server-package
          path: runner

      - name: Download recstore ops package artifact
        uses: actions/download-artifact@v4
        with:
          name: recstore-cpu-ops-package
          path: runner

      - name: Extract packages
        run: |
          set -euo pipefail
          mkdir -p runner/extracted/ps-server runner/extracted/recstore-ops
          tar -xzf runner/recstore-cpu-ps-server-package.tar.gz -C runner/extracted/ps-server
          tar -xzf runner/recstore-cpu-ops-package.tar.gz -C runner/extracted/recstore-ops
          echo "Extracted ps_server package:" && find runner/extracted/ps-server -maxdepth 3 -type f -print
          echo "Extracted recstore ops package:" && find runner/extracted/recstore-ops -maxdepth 3 -type f -print

      - name: Place RecStore OP into build/lib
        run: |
          set -euo pipefail
          OPS_ROOT=runner/extracted/recstore-ops/package
          mkdir -p "${OPS_ROOT}/lib"
          if [ -f "${OPS_ROOT}/lib/lib_recstore_ops.so" ]; then
            echo "lib_recstore_ops.so already present in package/lib; skipping copy"
          elif [ -f "${OPS_ROOT}/deps/lib/lib_recstore_ops.so" ]; then
            cp "${OPS_ROOT}/deps/lib/lib_recstore_ops.so" "${OPS_ROOT}/lib/"
          else
            echo "lib_recstore_ops.so not found in packed recstore ops" && exit 1
          fi
          mkdir -p build/lib
          cp -f "${OPS_ROOT}/lib/lib_recstore_ops.so" build/lib/
          if [ -d "${OPS_ROOT}/deps/lib" ]; then
            cp -f "${OPS_ROOT}/deps/lib/"*.so* build/lib/ || true
            echo "Copied runtime deps (*.so*) to build/lib"
          fi

      - name: Install torchrec and dependencies
        run: |
          set -euo pipefail
          bash dockerfiles/init_dlrm.sh --mirror=0

      - name: Fix config to reduce resource usage
        run: |
          set -euo pipefail
          bash ci/env/ci_fix_config.sh || true

      - name: Show recstore_config after fix
        run: |
          set -euo pipefail
          echo "===== recstore_config.json (after fix) ====="
          cat recstore_config.json || true

      - name: Run ps_server package
        run: |
          set -euo pipefail
          export GLOG_logtostderr=1
          export GLOG_v=1
          PKG_ROOT=runner/extracted/ps-server/package
          python3 ci/pack/runner.py "${PKG_ROOT}" bin/ps_server --ready-pattern "listening on" --timeout 180 --log runner/logs/recstore-cpu-ps-server.log --inject-rpath --keep-alive

      - name: Run ci/test/test_op.sh
        run: |
          set -euo pipefail
          bash ci/test/test_op.sh

      - name: Stop ps_server
        if: always()
        run: |
          set -euo pipefail
          pkill -f ps_server || true

      - name: Upload op and ps_server logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-op-ps-server-logs
          path: runner/logs/

  run-ycsb-benchmark:
    name: Test YCSB Benchmarks
    needs: build
    runs-on: ubuntu-latest
    env:
      TORCH_VERSION: "2.5.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install host prerequisites
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          bash ci/env/init_host_prereqs.sh

      - name: Download torch wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: recstore-cpu-torch-wheel
          path: wheel

      - name: Install wheel
        run: |
          set -euo pipefail
          WHL=$(ls -1 wheel/torch-${TORCH_VERSION}*linux_x86_64.whl | head -n1)
          python3 -m pip install --no-cache-dir "$WHL"

      - name: Download YCSB package artifact
        uses: actions/download-artifact@v4
        with:
          name: recstore-cpu-ycsb-package
          path: runner

      - name: Extract YCSB package
        run: |
          set -euo pipefail
          mkdir -p runner/extracted-ycsb
          tar -xzf runner/recstore-cpu-ycsb-package.tar.gz -C runner/extracted-ycsb
          echo "Extracted YCSB contents:" && find runner/extracted-ycsb -maxdepth 3

      - name: Run YCSB Test Scripts
        run: |
          set -euo pipefail
          PKG_ROOT=$(pwd)/runner/extracted-ycsb/package
          bash ci/test/test_ycsb.sh "${PKG_ROOT}"

      - name: Upload YCSB logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recstore-cpu-ycsb-logs
          path: dbtestlog/*.log
