name: Docker Image Test

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to test (for example: manual, sha-abc1234)"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  test-image:
    name: Pull image and run tests
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository }}/recstore-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve image reference
        id: image
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          REPO_LOWER="$(echo "${IMAGE_REPO}" | tr '[:upper:]' '[:lower:]')"
          if [ -n "${INPUT_IMAGE_TAG:-}" ]; then
            TAG="${INPUT_IMAGE_TAG}"
          else
            HEAD_SHA="${WORKFLOW_HEAD_SHA:-${GITHUB_SHA}}"
            SHORT_SHA_7="$(echo "${HEAD_SHA}" | cut -c1-7)"
            SHORT_SHA_12="$(echo "${HEAD_SHA}" | cut -c1-12)"
            TAG="sha-${SHORT_SHA_7}"
            echo "fallback_tag=sha-${SHORT_SHA_12}" >> "${GITHUB_OUTPUT}"
          fi

          echo "repo=${REPO_LOWER}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "image=${REPO_LOWER}:${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull docker image
        run: |
          set -euo pipefail
          IMAGE="${{ steps.image.outputs.image }}"
          FALLBACK_TAG="${{ steps.image.outputs.fallback_tag }}"
          echo "Trying image: ${IMAGE}"
          if docker pull "${IMAGE}"; then
            echo "pulled_image=${IMAGE}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${FALLBACK_TAG:-}" ]; then
            FALLBACK_IMAGE="${{ steps.image.outputs.repo }}:${FALLBACK_TAG}"
            echo "Primary tag not found, trying fallback: ${FALLBACK_IMAGE}"
            docker pull "${FALLBACK_IMAGE}"
            echo "pulled_image=${FALLBACK_IMAGE}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Failed to pull image with resolved tags" >&2
          exit 1

      - name: Run tests inside container
        env:
          TEST_IMAGE: ${{ steps.image.outputs.image }}
        run: |
          set -euo pipefail
          PULLED_IMAGE="${TEST_IMAGE}"
          if [ -n "${{ steps.image.outputs.fallback_tag }}" ] && ! docker image inspect "${TEST_IMAGE}" >/dev/null 2>&1; then
            PULLED_IMAGE="${{ steps.image.outputs.repo }}:${{ steps.image.outputs.fallback_tag }}"
          fi

          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${PULLED_IMAGE}" \
            bash -lc '
              set -euo pipefail
              export CI=true
              export GITHUB_ACTIONS=true
              export DEBIAN_FRONTEND=noninteractive
              export GLOG_logtostderr=1
              export GLOG_v=1

              trap "pkill -f ps_server || true" EXIT

              mkdir -p build
              cd build
              cmake -DENABLE_CUDA=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
              make -j4 ps_server _recstore_ops || make -j4 ps_server
              cd /workspace

              if [ -f build/lib/_recstore_ops.so ] && [ ! -f build/lib/lib_recstore_ops.so ]; then
                cp -f build/lib/_recstore_ops.so build/lib/lib_recstore_ops.so
              fi

              bash dockerfiles/init_dlrm.sh --mirror=0
              bash ci/env/ci_fix_config.sh || true

              python3 ci/pack/runner.py build bin/ps_server --ready-pattern "listening on" --timeout 180 --log runner/logs/docker-image-ps-server.log --keep-alive
              bash ci/test/test_op.sh
            '

      - name: Upload docker image test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-test-logs
          path: |
            runner/logs/
            init_env_*.log
            build/CMakeCache.txt
