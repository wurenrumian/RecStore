name: Docker Image Test

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to test (for example: manual, sha-abc1234). If not specified, will auto-detect from current commit or try latest available."
        required: false
        default: ""
        type: string
      use_latest:
        description: "Force use of latest available image instead of current commit"
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  test-image:
    name: Pull image and run tests
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository }}/recstore-devel
      TEST_CONTAINER: recstore-image-test-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve image reference
        id: image
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          REPO_LOWER="$(echo "${IMAGE_REPO}" | tr '[:upper:]' '[:lower:]')"
          if [ -n "${INPUT_IMAGE_TAG:-}" ]; then
            TAG="${INPUT_IMAGE_TAG}"
          else
            HEAD_SHA="${WORKFLOW_HEAD_SHA:-${GITHUB_SHA}}"
            SHORT_SHA_7="$(echo "${HEAD_SHA}" | cut -c1-7)"
            SHORT_SHA_12="$(echo "${HEAD_SHA}" | cut -c1-12)"
            TAG="sha-${SHORT_SHA_7}"
            echo "fallback_tag=sha-${SHORT_SHA_12}" >> "${GITHUB_OUTPUT}"
          fi

          echo "repo=${REPO_LOWER}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "image=${REPO_LOWER}:${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull docker image
        id: pull
        run: |
          set -euo pipefail
          REPO="${{ steps.image.outputs.repo }}"
          IMAGE="${{ steps.image.outputs.image }}"
          FALLBACK_TAG="${{ steps.image.outputs.fallback_tag }}"
          PRIMARY_TAG="${{ steps.image.outputs.tag }}"

          try_pull() {
            local tag_to_try=$1
            local img="${REPO}:${tag_to_try}"
            echo "Trying image: ${img}"
            if docker pull "${img}" 2>/dev/null; then
              echo "pulled_image=${img}" >> "${GITHUB_OUTPUT}"
              echo "✓ Successfully pulled image: ${img}"
              return 0
            fi
            return 1
          }

          # Try primary tag (based on current commit)
          if try_pull "${PRIMARY_TAG}"; then
            exit 0
          fi

          # Try 12-char sha fallback
          if [ -n "${FALLBACK_TAG:-}" ] && try_pull "${FALLBACK_TAG}"; then
            exit 0
          fi

          # Try manual tag (useful for workflow_dispatch)
          if try_pull "manual"; then
            exit 0
          fi

          # Try to find any available tag (as last resort)
          echo "Commit-specific tags not found. Searching for any available images..."
          available_tags=$(docker search "${REPO}" --format "table {{.Name}}\t{{.Stars}}" 2>/dev/null | grep "${REPO}" | head -1 || echo "")
          if [ -n "${available_tags}" ]; then
            echo "Note: Available images exist but none match your search criteria."
            echo "Available: ${available_tags}"
          fi

          echo "" >&2
          echo "Failed to find image at ${REPO}" >&2
          echo "Please run Docker Publish workflow first to build the image." >&2
          echo "Or manually trigger Docker Publish from Actions tab." >&2
          exit 1

      - name: Start test container
        env:
          TEST_IMAGE: ${{ steps.pull.outputs.pulled_image }}
        run: |
          set -euo pipefail
          PULLED_IMAGE="${TEST_IMAGE}"

          docker run -d --name "${TEST_CONTAINER}" --network host \
            "${PULLED_IMAGE}" \
            bash -lc 'tail -f /dev/null'

      - name: Build project inside container
        run: |
          set -euo pipefail
          docker exec "${TEST_CONTAINER}" bash -lc '
            set -euo pipefail
            export CI=true
            export GITHUB_ACTIONS=true
            export DEBIAN_FRONTEND=noninteractive
            export GLOG_logtostderr=1
            export GLOG_v=1

            cd /workspace
            mkdir -p runner/logs
            mkdir -p build
            cd build
            cmake -DENABLE_CUDA=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
            make -j4
          '

      - name: Run ctest (non-blocking)
        run: |
          set -euo pipefail
          set +e
          docker exec "${TEST_CONTAINER}" bash -lc '
            set -o pipefail
            cd /workspace/build
            ctest --output-on-failure 2>&1 | tee /workspace/runner/logs/ctest.log
            exit ${PIPESTATUS[0]}
          '
          CTEST_EXIT_CODE=$?
          set -e
          echo "ctest_exit_code=${CTEST_EXIT_CODE}" >> "${GITHUB_ENV}"
          if [ "${CTEST_EXIT_CODE}" -ne 0 ]; then
            echo "ctest failed with exit code ${CTEST_EXIT_CODE}, continue workflow by design."
          fi

      - name: Print ctest log summary
        if: always()
        run: |
          set -euo pipefail
          echo "===== ctest log summary (last 200 lines) ====="
          docker exec "${TEST_CONTAINER}" bash -lc '
            if [ -f /workspace/runner/logs/ctest.log ]; then
              tail -n 200 /workspace/runner/logs/ctest.log
            else
              echo "ctest log not found: /workspace/runner/logs/ctest.log"
            fi
          '
          echo "===== end of ctest log summary ====="

      - name: Run op tests inside container
        run: |
          set -euo pipefail
          docker exec "${TEST_CONTAINER}" bash -lc '
            set -euo pipefail

            cleanup_ps_server() {
              pids="$(pgrep -x ps_server || true)"
              if [ -n "${pids}" ]; then
                echo "Stopping ps_server PIDs: ${pids}"
                kill ${pids} || true
              fi
            }
            trap cleanup_ps_server EXIT

            pids_after_ctest="$(pgrep -x ps_server || true)"
            if [ -n "${pids_after_ctest}" ]; then
              echo "Cleaning stale ps_server after ctest: ${pids_after_ctest}"
              kill ${pids_after_ctest} || true
              sleep 2
            fi

            cd /workspace

            if [ -f build/lib/_recstore_ops.so ] && [ ! -f build/lib/lib_recstore_ops.so ]; then
              cp -f build/lib/_recstore_ops.so build/lib/lib_recstore_ops.so
            fi

            if [ ! -f build/lib/lib_recstore_ops.so ]; then
              echo "recstore ops shared library missing after build" >&2
              ls -lah build/lib || true
              find build -maxdepth 4 -name '*recstore*ops*.so*' -print || true
              exit 1
            fi

            bash dockerfiles/init_dlrm.sh --mirror=0
            bash ci/env/ci_fix_config.sh || true

            python3 ci/pack/runner.py build bin/ps_server --ready-pattern "listening on" --timeout 180 --log runner/logs/docker-image-ps-server.log --keep-alive
            bash ci/test/test_op.sh
          '

      - name: Collect test logs from container
        if: always()
        run: |
          set -euo pipefail
          mkdir -p runner/logs build
          docker cp "${TEST_CONTAINER}:/workspace/runner/logs" runner/ || true
          docker cp "${TEST_CONTAINER}:/workspace/build/CMakeCache.txt" build/CMakeCache.txt || true
          docker rm -f "${TEST_CONTAINER}" || true

      - name: Upload docker image test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-test-logs
          path: |
            runner/logs/
            init_env_*.log
            build/CMakeCache.txt
