name: "Pull Request Labeler"
on:
- pull_request_target

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/labeler@v5
    
    - uses: codelytv/pr-size-labeler@v1
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        xs_label: 'size/S'
        xs_max_size: '10'
        s_label: 'size/M'
        s_max_size: '100'
        m_label: 'size/L'
        m_max_size: '500'
        l_label: 'size/XL'
