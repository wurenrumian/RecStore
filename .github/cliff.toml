[remote.github]
owner = "RecStore"
repo = "RecStore"
[changelog]
header = """
# Changelog
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
        {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | split(pat="\n") | first | upper_first }} \
        {% if commit.remote.username %} @{{ commit.remote.username }}{% else %} {{ commit.author.name }}{% endif %}
        {%- if commit.footers -%}
            {%- for footer in commit.footers -%}
                {%- if footer.token == "Co-authored-by" -%}
                    {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} @{{ co_author_name }}
                {%- endif -%}
            {%- endfor -%}
        {%- endif %}
{%- endmacro -%}

{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## Unreleased
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}
{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## New Contributors ❤️
{% endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

footer = """

---

Notes:

- These packages intentionally exclude host-provided runtime libraries such as glibc and the system loader.
- Recommended target environments are Ubuntu 20.04/22.04 or similar Linux distributions with a compatible userspace.
- Install runtime prerequisites with `bash ci/env/init_host_prereqs.sh` before use.

Docker Image:

- GHCR package: https://github.com/RecStore/RecStore/pkgs/container/recstore-devel
- Pull latest prebuilt image: `docker pull ghcr.io/recstore/recstore/recstore-devel:latest`
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
commit_parsers = [
    { message = ".*\\[skip changelog\\].*", skip = true },
    { body = ".*\\[skip changelog\\].*", skip = true },
    { message = "^bot", group = "<!-- 12 -->🤖 Bot" },
    { message = "^feat", group = "<!-- 0 -->✨ Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^docs", group = "<!-- 4 -->📚 Documentation" },
    { message = "^perf", group = "<!-- 3 -->🚀 Performance" },
    { message = "^(refactor|rft)", group = "<!-- 2 -->🚜 Refactoring" },
    { message = "^style", group = "<!-- 5 -->🎨 Style" },
    { message = "^test", group = "<!-- 6 -->🧪 Testing" },
    { message = "^chore\\(deps\\)", group = "📦 Dependencies" },
    { message = "^chore", group = "<!-- 8 -->🔧 Chores" },
    { message = "^ci", group = "<!-- 7 -->⚙️ CI" },
    { message = "^ai", group = "<!-- 11 -->🤖 AI" },
    { body = ".*security", group = "<!-- 9 -->🔒 Security" },
    { message = "^revert", group = "<!-- 10 -->◀️ Reverts" },
]

ignore_tags = "rc"

sort_commits = "oldest"

[git.github]
commits = true